server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: roamfx-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/roamfx}
    username: ${DATABASE_USERNAME:roamfx}
    password: ${DATABASE_PASSWORD:roamfx}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  jwtSecret: ${JWT_SECRET:local-dev-secret-local-dev-secret-local-dev-secret}
  jwtExpiryMinutes: ${JWT_EXPIRY_MINUTES:120}
  allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rateLockMinutes: ${RATE_LOCK_MINUTES:30}
  suspiciousDeviationPercent: ${SUSPICIOUS_DEVIATION_PERCENT:8}
  aiProvider: ${AI_PROVIDER:mock}
logging:
  level:
    org.springframework.security: INFO
