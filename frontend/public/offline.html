<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoamFX offline</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f6f0; color: #172033; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      section { max-width: 420px; border: 1px solid #ddd3c2; border-radius: 12px; background: #fff; padding: 24px; box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08); }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { color: #5f6674; line-height: 1.6; }
      a { color: #0c7378; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>RoamFX is offline</h1>
        <p>Your saved demo shell is available, but live rates, bookings, KYC, and waitlist actions need a network connection.</p>
        <p><a href="/">Try again</a></p>
      </section>
    </main>
  </body>
</html>
