previews:
  generation: manual

databases:
  - name: roamfx-postgres
    plan: basic-256mb
    region: singapore
    databaseName: roamfx
    user: roamfx
    postgresMajorVersion: "16"

services:
  - type: web
    name: roamfx-backend
    runtime: docker
    plan: starter
    region: singapore
    rootDir: backend
    autoDeployTrigger: checksPass
    healthCheckPath: /swagger-ui.html
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DATABASE_HOST
        fromDatabase:
          name: roamfx-postgres
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: roamfx-postgres
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: roamfx-postgres
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: roamfx-postgres
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: roamfx-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://roamfx-frontend.onrender.com
      - key: RATE_LOCK_MINUTES
        value: 30
      - key: SUSPICIOUS_DEVIATION_PERCENT
        value: 8
      - key: AI_PROVIDER
        value: mock

  - type: web
    name: roamfx-frontend
    runtime: docker
    plan: starter
    region: singapore
    rootDir: frontend
    autoDeployTrigger: checksPass
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://roamfx-backend.onrender.com
