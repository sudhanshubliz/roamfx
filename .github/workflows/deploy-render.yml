name: Deploy Render

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Check deploy hook configuration
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ] || [ -z "$RENDER_FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "Render deploy hook secrets are not configured. Skipping deploy."
            exit 0
          fi

      - name: Deploy backend
        if: env.RENDER_BACKEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"

      - name: Deploy frontend
        if: env.RENDER_FRONTEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"
