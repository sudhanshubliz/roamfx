services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roamfx
      POSTGRES_USER: roamfx
      POSTGRES_PASSWORD: roamfx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/roamfx
      DATABASE_USERNAME: roamfx
      DATABASE_PASSWORD: roamfx
      JWT_SECRET: local-compose-secret-local-compose-secret-1234
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
volumes:
  postgres_data:
